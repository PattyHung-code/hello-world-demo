name: Webserver Review

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-and-capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start FastAPI server
        run: |
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server and fetch page
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/ -o response.html; then
              break
            fi
            sleep 1
          done

          test -f response.html
          grep -q "Hello World" response.html

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webserver-output
          path: |
            response.html
            server.log

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
